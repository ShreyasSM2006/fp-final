<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Volunteer</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  min-height: 100vh;
  background-color: #f4f4f4;
  display: flex;
  flex-direction: column;
}

footer { margin-top: auto; }

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  width: 100%;
  background: white;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  z-index: 1000;
}

.nav-container {
  max-width: 1300px;
  margin: auto;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  padding: 12px 20px;
  gap: 20px;
}

.logo-container { display: flex; align-items: center; gap: 12px; }
.logo-container img { height: 40px; width: auto; }

.nav-links {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 5px;
}

.nav-links li { position: relative; white-space: nowrap; }

.nav-links li a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  padding: 15px 15px;
  display: block;
  transition: 0.3s;
}

.nav-links li > a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #e63946;
  left: 15px;
  bottom: 10px;
  transition: 0.3s;
}

.nav-links li:hover > a::after { width: calc(100% - 30px); }

.dropdown-content {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: white;
  min-width: 200px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  border-radius: 0 0 6px 6px;
  list-style: none;
  padding: 10px 0;
  border-top: 2px solid #e63946;
}

.nav-links li:hover .dropdown-content { display: block; }

.dropdown-content li { display: block; width: 100%; }

.dropdown-content li a { padding: 10px 20px; font-size: 14px; font-weight: 400; color: #555; }

.dropdown-content li a:hover { background: #f8f9fa; color: #e63946; padding-left: 25px; }

.dropbtn::after { content: ' ▾'; font-size: 10px; opacity: 0.6; }

.donate-btn {
  background: #e63946;
  color: white;
  padding: 10px 22px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.donate-btn:hover { background: #c92a35; }

.hamburger { display: none; flex-direction: column; cursor: pointer; }
.hamburger div { width: 25px; height: 3px; background: black; margin: 4px; }

@media (max-width: 1100px) {
  .nav-container { grid-template-columns: auto auto; }

  .nav-links {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: white;
    flex-direction: column;
    display: none;
    padding: 0;
    box-shadow: 0 10px 10px rgba(0,0,0,0.1);
  }

  .nav-links.active { display: flex; }
  .nav-links li { width: 100%; text-align: center; }

  .dropdown-content {
    position: static;
    box-shadow: none;
    background: #fdfdfd;
    border-top: none;
    display: none;
  }

  .nav-links li:hover .dropdown-content { display: block; }
  .hamburger { display: flex; }
  .donate-btn { display: none; }
}

/* HERO */
.main-ui {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  min-height: 100vh;
}

.hero {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  text-align: center;
  color: white;
  margin-top: 10px;
  margin-bottom: 10px;
  padding: 40px 20px 20px 20px;
}

.hero h1 { margin: 0 0 8px 0; font-size: 52px; font-weight: 800; }
.hero p { margin: 0 0 12px 0; font-weight: 400; font-size: 1.2rem; opacity: 0.9; }

/* FORM */
.form-wrapper { max-width: 450px; margin: 0 auto; padding: 0 0 40px; }

.form-box {
  width: 100%;
  max-width: 450px;
  padding: 40px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  text-align: center;
  color: white;
}

.form-box h2 { margin-bottom: 30px; }

form input,
form select,
form textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
}

form select option { color: #333; }

form input::placeholder,
form textarea::placeholder { color: #eee; }

form textarea { min-height: 100px; resize: vertical; }

form button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #333;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  font-size: 15px;
}

form button:hover { background: #f0f0f0; transform: translateY(-1px); }
form button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* TOAST NOTIFICATION */
.toast {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 28px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  color: white;
  z-index: 9999;
  animation: fadeInUp 0.4s ease;
}

.toast.success { background: #27ae60; }
.toast.error   { background: #e63946; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translate(-50%, 20px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* PHONE INPUT FIX */
.phone-input { width: 100%; margin-bottom: 15px; }
.iti { width: 100%; }
.iti input { padding-left: 0 !important; }
.iti--separate-dial-code input { padding-left: 90px !important; color: white; }

#phone {
  height: 45px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 12px;
  box-sizing: border-box;
  margin-bottom: 0;
}

.iti__flag-container { left: 0; padding-left: 10px; }

.iti--separate-dial-code .iti__selected-flag {
  background: transparent;
  color: white;
  border-radius: 10px 0 0 10px;
}
</style>
</head>

      <li class="dropdown">

          <li><a href="About.html">Our Vision</a></li>

        </ul>
      </li>

      <li class="dropdown">

          <li><a href="#">Our Partners</a></li>
          <li><a href="#">Careers</a></li>
        </ul> -->

        <a href="projects.html" class="dropbtn">Projects</a>

        <!-- <ul class="dropdown-content">

        </ul> -->
      </li>

      <li class="dropdown">

        <!-- <ul class="dropdown-content">

        </ul> -->
      </li>

      <li><a href="contact.html">Contact Us</a></li>
    </ul>

    <a href="donate.html" class="donate-btn">Donate</a>

    <div class="hamburger" onclick="toggleMenu()">
      <div></div><div></div><div></div>
    </div>
  </div>
</nav>

<!-- MAIN UI -->
<div class="main-ui">
  <section class="hero">
    <div>
      <h1>Make Your Time Matter</h1>
      <p>Join us and create real impact</p>
    </div>
  </section>

  <section class="form-wrapper">
    <div class="form-box">
      <h2>Volunteer With Us</h2>

      <!--
        IMPORTANT: Every input has an id so submitForm() can read it.
        The select has id="interest" and textarea has id="message".
      -->
      <form id="volunteerForm" onsubmit="submitForm(event)">

        <input
          id="name"
          type="text"
          placeholder="Full Name"
          required
        />

        <input
          id="email"
          type="email"
          placeholder="Email Address"
          required
        />

        <!-- Phone with country flag -->
        <div class="phone-input">
          <input id="phone" type="tel" placeholder="Phone Number" />
        </div>

        <select id="interest" required>
          <option value="">Select Interest</option>
          <option value="Education">Education</option>
          <option value="Environment">Environment</option>
          <option value="Healthcare">Healthcare</option>
        </select>

        <textarea
          id="message"
          placeholder="Why do you want to volunteer?"
          required
        ></textarea>

        <button type="submit" id="submitBtn">Submit Application</button>
      </form>
    </div>
  </section>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- intl-tel-input JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>

<script>
  // ── Hamburger toggle ──────────────────────────
  function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
  }

  // ── Phone input initialisation ───────────────
  const phoneInput = document.querySelector("#phone");
  const iti = window.intlTelInput(phoneInput, {
    initialCountry: "in",
    separateDialCode: true,
    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
  });

  // ── Toast helper ─────────────────────────────
  function showToast(msg, type = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 4000);
  }

  // ── Form submit ──────────────────────────────
  async function submitForm(event) {
    event.preventDefault(); // Prevent default page reload

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Submitting...";

    // Collect form data
    const data = {
      name:     document.getElementById("name").value.trim(),
      email:    document.getElementById("email").value.trim(),
      phone:    iti.getNumber(),           // includes country code, e.g. +919876543210
      interest: document.getElementById("interest").value,
      message:  document.getElementById("message").value.trim()
    };

    try {
      const res = await fetch("http://localhost:5000/api/volunteer/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.success) {
        showToast("✅ " + result.message, "success");
        document.getElementById("volunteerForm").reset(); // Clear the form
        iti.setCountry("in"); // Reset phone flag
      } else {
        showToast("❌ " + result.message, "error");
      }

    } catch (err) {
      console.error("Submit error:", err);
      showToast("❌ Could not reach the server. Is it running?", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit Application";
    }
  }
</script>

</body>
